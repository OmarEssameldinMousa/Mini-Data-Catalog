services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  
    restart: unless-stopped

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - catalog_network
    
  registry:
    build: ./services/registry
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    ports:
      - "8001:8000"
    networks:
      - catalog_network

    restart: unless-stopped

  validator:
    build: ./services/validator
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


    ports:
      - "8002:8000"
    networks:
      - catalog_network

    restart: unless-stopped

  lineage:
    build: ./services/lineage    
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


    ports:
      - "8003:8000"
    networks:
      - catalog_network

    restart: unless-stopped

  ingestion:
    build: ./services/ingestion
    env_file:
      - .env
    
    depends_on:
      postgres:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

    ports:
      - "8004:8000"
    networks:
      - catalog_network

    restart: unless-stopped
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      registry:
        condition: service_healthy
      validator:
        condition: service_healthy
      lineage:
        condition: service_healthy
      ingestion:
        condition: service_healthy
    networks:
      - catalog_network

networks:
  catalog_network:

volumes:
  postgres_data: