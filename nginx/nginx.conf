
upstream registry_upstream {
    server registry:8000;
}

upstream validator_upstream {
    server validator:8000;
}

upstream lineage_upstream {
    server lineage:8000;
}

upstream ingestion_upstream {
    server ingestion:8000;
}


server{
    listen 80;

    location /api/registry/ {

        rewrite ^/api/registry/(.*)$ /$1 break;

        proxy_pass http://registry_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /api/validator/ {

        rewrite ^/api/validator/(.*)$ /$1 break;

        proxy_pass http://validator_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  
    }



    location /api/lineage/ {

        rewrite ^/api/lineage/(.*)$ /$1 break;

        proxy_pass http://lineage_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  
    }

    location /api/ingestion/ {

        rewrite ^/api/ingestion/(.*)$ /$1 break;

        proxy_pass http://ingestion_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location /docs {
        return 200 "Merged OpenAPI docs will live here";
    }

}